name: Build & Deploy API (minikube local)

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permet aussi de lancer le workflow à la main depuis GitHub

jobs:
  deploy:
    # IMPORTANT : runner self-hosted = il tourne sur TA machine,
    # donc il a accès à minikube / kubectl / docker et à ton cluster local.
    runs-on: self-hosted

    env:
      IMAGE: text2sql-api
      TAG: ${{ github.sha }}            # un tag unique par commit -> force un vrai redéploiement
      MINIKUBE_PROFILE: minikube

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      # On build l'image DANS le docker de minikube (pas besoin de registry).
      - name: Build l'image dans minikube
        run: |
          eval "$(minikube -p "$MINIKUBE_PROFILE" docker-env)"
          docker build -t "$IMAGE:$TAG" .

      # On (re)crée le Secret à partir des secrets GitHub du repo.
      - name: Créer/mettre à jour le Secret
        run: |
          kubectl create secret generic text2sql-api-secrets \
            --from-literal=MAMMOUTH_API_KEY="${{ secrets.MAMMOUTH_API_KEY }}" \
            --from-literal=PG_PASSWORD="${{ secrets.PG_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # On applique les manifests. On remplace le tag d'image par le tag du commit.
      - name: Déployer sur minikube
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/service.yaml
          sed "s|text2sql-api:dev|$IMAGE:$TAG|" k8s/deployment.yaml | kubectl apply -f -

      - name: Attendre le rollout
        run: kubectl rollout status deployment/text2sql-api --timeout=180s

      - name: Afficher l'URL du service
        run: minikube -p "$MINIKUBE_PROFILE" service text2sql-api --url
